<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="1080" viewBox="0 0 1600 1080" role="img" aria-labelledby="title desc">
  <title id="title">Ford Triplog architecture</title>
  <desc id="desc">Architecture diagram showing FordPass data, coordinator, trip and charging processing, OpenStreetMap charging-site database pipeline, local storage, statistics and Home Assistant sensors.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#071a2c"/>
      <stop offset="1" stop-color="#102f4c"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#36a9e1"/>
      <stop offset="1" stop-color="#1677b8"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#42d39b"/>
      <stop offset="1" stop-color="#19966e"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbd59"/>
      <stop offset="1" stop-color="#e38323"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000" flood-opacity=".28"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#83c8ef"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 z" fill="#57d9aa"/>
    </marker>
    <style>
      .title { font: 700 42px Arial, sans-serif; fill: #fff; }
      .subtitle { font: 400 20px Arial, sans-serif; fill: #b9d4e7; }
      .box-title { font: 700 22px Arial, sans-serif; fill: #fff; }
      .box-text { font: 400 16px Arial, sans-serif; fill: #d7e7f2; }
      .small { font: 400 14px Arial, sans-serif; fill: #c7ddeb; }
      .section { font: 700 18px Arial, sans-serif; fill: #79c8f3; letter-spacing: 1px; }
      .line { fill: none; stroke: #83c8ef; stroke-width: 4; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #57d9aa; stroke-width: 4; marker-end: url(#arrowGreen); }
      .line-dash { fill: none; stroke: #ffbd59; stroke-width: 3; stroke-dasharray: 10 8; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1600" height="1080" rx="28" fill="url(#bg)"/>
  <text x="70" y="70" class="title">Ford Triplog Architecture</text>
  <text x="70" y="105" class="subtitle">Event-driven Home Assistant integration with local charging-site recognition</text>

  <text x="70" y="160" class="section">LIVE VEHICLE DATA</text>
  <g filter="url(#shadow)">
    <rect x="70" y="185" width="300" height="190" rx="18" fill="#123b5d" stroke="#2b8fc7" stroke-width="2"/>
    <text x="100" y="225" class="box-title">FordPass Integration</text>
    <text x="100" y="260" class="box-text">Ignition</text>
    <text x="100" y="288" class="box-text">Odometer</text>
    <text x="100" y="316" class="box-text">Vehicle position</text>
    <text x="100" y="344" class="box-text">SOC and charging status</text>
  </g>

  <path d="M370 280 H475" class="line"/>

  <text x="470" y="160" class="section">RUNTIME CORE</text>
  <g filter="url(#shadow)">
    <rect x="470" y="185" width="410" height="190" rx="18" fill="url(#blue)"/>
    <text x="505" y="225" class="box-title">FordTriplogCoordinator</text>
    <text x="505" y="260" class="box-text">State-change handling</text>
    <text x="505" y="288" class="box-text">Stable-state waiting</text>
    <text x="505" y="316" class="box-text">Recovery and finalization</text>
    <text x="505" y="344" class="box-text">Sensor update orchestration</text>
  </g>

  <path d="M675 375 V445" class="line"/>

  <g filter="url(#shadow)">
    <rect x="430" y="455" width="230" height="155" rx="18" fill="#153e59" stroke="#3b9dce" stroke-width="2"/>
    <text x="460" y="495" class="box-title">Trip Engine</text>
    <text x="460" y="530" class="box-text">Trip detection</text>
    <text x="460" y="558" class="box-text">Smart Trip</text>
    <text x="460" y="586" class="box-text">Trip ↔ charge link</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="690" y="455" width="250" height="155" rx="18" fill="#153e59" stroke="#3b9dce" stroke-width="2"/>
    <text x="720" y="495" class="box-title">Charging Engine</text>
    <text x="720" y="530" class="box-text">Start / end detection</text>
    <text x="720" y="558" class="box-text">SOC and energy</text>
    <text x="720" y="586" class="box-text">Site enrichment</text>
  </g>

  <path d="M815 455 V410 H1055 V455" class="line-green"/>

  <text x="1010" y="160" class="section">CHARGING-SITE DATA</text>
  <g filter="url(#shadow)">
    <rect x="1010" y="185" width="240" height="125" rx="18" fill="url(#orange)"/>
    <text x="1040" y="225" class="box-title">OpenStreetMap</text>
    <text x="1040" y="258" class="box-text">Overpass download</text>
    <text x="1040" y="286" class="box-text">Selected country</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="1280" y="185" width="250" height="125" rx="18" fill="#68451f" stroke="#ffbd59" stroke-width="2"/>
    <text x="1310" y="225" class="box-title">JSON Import</text>
    <text x="1310" y="258" class="box-text">Compatible country DB</text>
    <text x="1310" y="286" class="box-text">Validation + backup</text>
  </g>

  <path d="M1130 310 V355 H1250" class="line-dash"/>
  <path d="M1405 310 V355 H1250" class="line-dash"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="365" width="520" height="150" rx="18" fill="#1e4c43" stroke="#57d9aa" stroke-width="2"/>
    <text x="1040" y="405" class="box-title">Charging-Site Builder Pipeline</text>
    <text x="1040" y="440" class="box-text">Normalize → group sites → build geohash index</text>
    <text x="1040" y="470" class="box-text">Create country database → validate → activate</text>
    <text x="1040" y="498" class="small">charging_sites/generated/charging_sites_&lt;country&gt;.json</text>
  </g>

  <path d="M1270 515 V570" class="line-green"/>

  <g filter="url(#shadow)">
    <rect x="1010" y="580" width="520" height="155" rx="18" fill="url(#green)"/>
    <text x="1040" y="620" class="box-title">ChargingSiteLookup</text>
    <text x="1040" y="655" class="box-text">Geohash candidate search</text>
    <text x="1040" y="683" class="box-text">Radius and distance validation</text>
    <text x="1040" y="711" class="box-text">Name, brand, operator, network, power and connectors</text>
  </g>

  <path d="M1010 655 H940" class="line-green"/>

  <g filter="url(#shadow)">
    <rect x="690" y="645" width="250" height="105" rx="18" fill="#153e59" stroke="#3b9dce" stroke-width="2"/>
    <text x="720" y="685" class="box-title">Reverse Geocoding</text>
    <text x="720" y="718" class="box-text">Postal address data</text>
  </g>

  <path d="M815 610 V645" class="line"/>

  <text x="70" y="800" class="section">LOCAL DATA AND HOME ASSISTANT</text>

  <g filter="url(#shadow)">
    <rect x="70" y="825" width="360" height="175" rx="18" fill="#17364f" stroke="#4f93bd" stroke-width="2"/>
    <text x="100" y="865" class="box-title">JSON Storage</text>
    <text x="100" y="900" class="box-text">recovery/ current sessions</text>
    <text x="100" y="928" class="box-text">trips/ and charges/ archives</text>
    <text x="100" y="956" class="box-text">cache/ last records + statistics</text>
    <text x="100" y="984" class="small">Atomic local file writes</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="500" y="825" width="350" height="175" rx="18" fill="#17364f" stroke="#4f93bd" stroke-width="2"/>
    <text x="530" y="865" class="box-title">History + Statistics</text>
    <text x="530" y="900" class="box-text">Trip and charging aggregates</text>
    <text x="530" y="928" class="box-text">Shared compact sensor snapshot</text>
    <text x="530" y="956" class="box-text">Reduced disk access</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="920" y="825" width="610" height="175" rx="18" fill="#17364f" stroke="#4f93bd" stroke-width="2"/>
    <text x="950" y="865" class="box-title">Home Assistant Sensors</text>
    <text x="950" y="900" class="box-text">Latest trip and charging session</text>
    <text x="950" y="928" class="box-text">Charging-site name and detailed attributes</text>
    <text x="950" y="956" class="box-text">Statistics, dashboards, automations and history</text>
    <text x="950" y="984" class="small">Native units, device classes and translations</text>
  </g>

  <path d="M545 610 V765 H250 V825" class="line"/>
  <path d="M815 750 V785 H250 V825" class="line"/>
  <path d="M430 912 H500" class="line"/>
  <path d="M850 912 H920" class="line"/>

  <text x="70" y="1045" class="small">Normal operation remains local. OpenStreetMap is contacted only when a country database is explicitly downloaded.</text>
</svg>
